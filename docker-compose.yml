version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: uris_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1212
      POSTGRES_DB: uris_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uris_network

networks:
  uris_network:
    driver: bridge

volumes:
  postgres_data:

<!-- URIS — Login page, STEMONEF aesthetic -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URIS · Sign In</title>
  <link rel="stylesheet" href="../styles/global.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-logo {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 2.8rem;
      letter-spacing: 0.15em;
      color: var(--white);
      line-height: 1;
    }

    .login-logo span { color: var(--gold); }

    .login-tagline {
      font-family: var(--font-ui);
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--white-faint);
      margin-top: 0.4rem;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      box-shadow: var(--shadow-card), var(--shadow-glow);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .login-title {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.75rem;
      text-align: center;
    }

    .role-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }

    .role-tab {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      color: var(--white-dim);
      font-family: var(--font-ui);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.65rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .role-tab:hover   { color: var(--white); border-color: var(--border); }
    .role-tab.active  { background: rgba(201,168,76,0.1); border-color: var(--gold); color: var(--gold); }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      color: var(--white-faint);
      font-family: var(--font-ui);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }

    .submit-btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.85rem;
    }

    .login-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: var(--white-faint);
      font-style: italic;
    }

    .error-banner {
      background: rgba(224,92,92,0.1);
      border: 1px solid rgba(224,92,92,0.3);
      border-radius: var(--radius);
      color: var(--red-alert);
      font-family: var(--font-ui);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-banner.show { display: block; }
  </style>
</head>
<body>
<canvas id="starfield"></canvas>

<div class="login-wrap">
  <div class="login-brand anim-fade-up">
    <div class="login-logo">URIS<span>·</span>V3</div>
    <div class="login-tagline">Unified Resource Intelligence System</div>
  </div>

  <div class="login-card anim-fade-up anim-delay-1">
    <div class="login-title">Access Portal</div>

    <!-- Role selector -->
    <div class="role-tabs">
      <div class="role-tab active" data-role="INTERN" onclick="selectRole(this)">Intern</div>
      <div class="role-tab"       data-role="ADMIN"  onclick="selectRole(this)">Lead / Admin</div>
    </div>

    <div class="error-banner" id="errorBanner"></div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="emailInput" placeholder="your@email.com"
        onkeydown="if(event.key==='Enter') submitLogin()" />
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="passwordInput" placeholder="••••••••"
        onkeydown="if(event.key==='Enter') submitLogin()" />
    </div>

    <button class="btn btn-gold submit-btn" id="loginBtn" onclick="submitLogin()">
      Sign In
    </button>

    <div class="divider">or</div>

    <button class="btn btn-outline w-full" onclick="showRegister()">Create account</button>

    <!-- Register form (hidden by default) -->
    <div id="registerForm" style="display:none; margin-top:1.25rem;">
      <div class="divider" style="margin-top:0">New account</div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="regEmail" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="regPassword" placeholder="Min. 8 characters" />
      </div>
      <button class="btn btn-outline w-full" onclick="submitRegister()">Register</button>
    </div>
  </div>

  <div class="login-footer">URIS V3 · Internal platform · Access restricted</div>
</div>

<script type="module">
import { initStarfield } from '../utils/utils.js';
import { API, saveToken } from '../utils/utils.js';
initStarfield();

let selectedRole = 'INTERN';

window.selectRole = function(tab) {
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  selectedRole = tab.dataset.role;
}

function showError(msg) {
  const b = document.getElementById('errorBanner');
  b.textContent = msg;
  b.classList.add('show');
}

function hideError() { document.getElementById('errorBanner').classList.remove('show'); }

window.submitLogin = async function() {
  hideError();
  const email    = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  if (!email || !password) { showError('Email and password are required.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message ?? 'Login failed');

    saveToken(data.data.token);

    // Route based on role
    if (data.data.role === 'ADMIN') {
      window.location.href = '/pages/dashboard.html';
    } else {
      window.location.href = '/pages/availability.html';
    }
  } catch(e) {
    showError(e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

window.showRegister = function() {
  const f = document.getElementById('registerForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

window.submitRegister = async function() {
  hideError();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!email || !password) { showError('Both fields required.'); return; }

  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, role: selectedRole })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message ?? 'Registration failed');

    document.getElementById('emailInput').value    = email;
    document.getElementById('passwordInput').value = password;
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('errorBanner').classList.remove('show');
    document.getElementById('errorBanner').style.color = 'var(--green-ok)';
    document.getElementById('errorBanner').textContent = 'Account created. Signing you in…';
    document.getElementById('errorBanner').classList.add('show');
    setTimeout(submitLogin, 800);
  } catch(e) {
    showError(e.message);
  }
}
</script>
</body>
</html>
